version: 2

builds:
  - main: .
    binary: ohara
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/Lackech/ohara/apps/cli/cmd.Version={{.Version}}

archives:
  - format: tar.gz
    name_template: "ohara_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

brews:
  - repository:
      owner: Lackech
      name: homebrew-ohara
    name: ohara
    homepage: https://ohara.dev
    description: CLI for Ohara — agent-optimized documentation
    license: MIT
    install: |
      bin.install "ohara"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}} — Ohara</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3/dist/tailwind.min.css" rel="stylesheet">
  <style>
    .prose h1 { font-size: 1.875rem; font-weight: 700; margin-bottom: 1rem; }
    .prose h2 { font-size: 1.5rem; font-weight: 600; margin-top: 2rem; margin-bottom: 0.75rem; border-bottom: 1px solid #374151; padding-bottom: 0.5rem; }
    .prose h3 { font-size: 1.25rem; font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.5rem; }
    .prose p { margin-bottom: 1rem; line-height: 1.75; }
    .prose ul, .prose ol { margin-bottom: 1rem; padding-left: 1.5rem; }
    .prose li { margin-bottom: 0.25rem; }
    .prose code { background: #1f2937; padding: 0.125rem 0.375rem; border-radius: 0.25rem; font-size: 0.875rem; }
    .prose pre { background: #111827; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin-bottom: 1rem; }
    .prose pre code { background: none; padding: 0; }
    .prose table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; }
    .prose th, .prose td { border: 1px solid #374151; padding: 0.5rem 0.75rem; text-align: left; }
    .prose th { background: #1f2937; font-weight: 600; }
    .prose a { color: #60a5fa; text-decoration: underline; }
    .prose blockquote { border-left: 4px solid #3b82f6; padding-left: 1rem; color: #9ca3af; margin-bottom: 1rem; }
    .type-tutorial { background: #065f46; color: #6ee7b7; }
    .type-guide { background: #1e40af; color: #93c5fd; }
    .type-reference { background: #581c87; color: #c4b5fd; }
    .type-explanation { background: #78350f; color: #fcd34d; }
    mark { background: #854d0e; color: #fef3c7; padding: 0 2px; border-radius: 2px; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
  <div class="flex h-screen">
    <!-- Sidebar -->
    <aside class="w-72 bg-gray-900 border-r border-gray-800 flex flex-col overflow-hidden">
      <div class="p-4 border-b border-gray-800">
        <a href="/" class="text-lg font-bold">{{.HubName}}</a>
        <p class="text-xs text-gray-500 mt-1">Ohara Documentation Hub</p>
      </div>

      <!-- Search -->
      <div class="p-3 border-b border-gray-800">
        <input type="text" name="q" placeholder="Search docs..."
          class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500"
          hx-get="/search" hx-trigger="keyup changed delay:200ms" hx-target="#main-content"
          hx-include="this">
      </div>

      <!-- Navigation -->
      <nav class="flex-1 overflow-y-auto p-3" id="sidebar-nav"
        hx-get="/nav" hx-trigger="load" hx-swap="innerHTML">
        <p class="text-gray-500 text-sm">Loading...</p>
      </nav>
    </aside>

    <!-- Main content -->
    <main class="flex-1 overflow-y-auto">
      <div class="max-w-4xl mx-auto p-8" id="main-content">
        {{.Content}}
      </div>
    </main>
  </div>
</body>
</html>

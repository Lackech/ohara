<h2 class="text-xl font-semibold mb-4">Search results for "{{.Query}}"</h2>

{{if not .Results}}
<p class="text-gray-500">No results found.</p>
{{else}}
<p class="text-sm text-gray-500 mb-4">{{len .Results}} results</p>
<div class="space-y-4">
  {{range .Results}}
  <a href="/doc/{{.Path}}" class="block rounded-lg border border-gray-800 p-4 hover:border-gray-600 transition-colors"
    hx-get="/doc/{{.Path}}" hx-target="#main-content" hx-push-url="true">
    <div class="flex items-center gap-2">
      <span class="font-medium">{{.Title}}</span>
      <span class="px-2 py-0.5 rounded text-xs type-{{.DiataxisType}}">{{.DiataxisLabel}}</span>
    </div>
    <div class="text-sm text-gray-500 mt-1">{{.Service}} / {{.Path}}</div>
    {{if .Snippet}}<div class="text-sm text-gray-400 mt-2">{{.Snippet}}</div>{{end}}
  </a>
  {{end}}
</div>
{{end}}
